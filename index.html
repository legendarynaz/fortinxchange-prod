<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>4ortin-X</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- PWA Meta Tags -->
    <meta name="description" content="4ortin-X - Non-custodial crypto wallet. Buy, store, and swap tokens across multiple blockchains." />
    <meta name="theme-color" content="#0D1117" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F0B90B" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="4ortin-X" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="4ortin-X" />
    <meta name="msapplication-TileColor" content="#0D1117" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png" />

    <!-- iOS Splash Screens -->
    <meta name="apple-mobile-web-app-title" content="4ortin-X">
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      @keyframes flash-green { from { background-color: rgba(22, 163, 74, 0.2); } to { background-color: transparent; } }
      .flash-green { animation: flash-green 0.75s ease-out; }
      @keyframes flash-red { from { background-color: rgba(220, 38, 38, 0.2); } to { background-color: transparent; } }
      .flash-red { animation: flash-red 0.75s ease-out; }
      @keyframes highlight-new-trade { from { background-color: rgba(59, 130, 246, 0.15); } to { background-color: transparent; } }
      .highlight-new-trade { animation: highlight-new-trade 1.5s ease-out; }
      /* Crypto background floating animations */
      @keyframes float-slow { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
      @keyframes float-medium { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(-5deg); } }
      @keyframes float-fast { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
      .animate-float-slow { animation: float-slow 8s ease-in-out infinite; }
      .animate-float-medium { animation: float-medium 6s ease-in-out infinite; }
      .animate-float-fast { animation: float-fast 4s ease-in-out infinite; }
    </style>
</head>
  <body class="text-slate-100" style="background-color: #0D1117;">
    <div id="root"></div>
    <script>
      // Set dark mode immediately before React loads
      (function() {
        var theme = localStorage.getItem('theme');
        if (!theme || theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service worker temporarily disabled to avoid cache-related layout issues during rollout -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      }
    </script>
  </body>
</html>
